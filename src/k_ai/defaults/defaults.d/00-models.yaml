# ┌─────────────────────────────────────────────────────────────────────────┐
# │  k-ai  —  Default Configuration                                         │
# │                                                                          │
# │  Built-in defaults are split into topical fragments for faster,          │
# │  cleaner maintenance. Export with:  k-ai config get -o my_config.yaml    │
# └─────────────────────────────────────────────────────────────────────────┘

# ==============================================================================
# Active LLM Settings
# ==============================================================================

# Default provider used when the user does not force one with --provider or
# via /provider in chat. Must match a key under no_auth, api_key, or oauth.
provider: "ollama"

# Optional model override. Leave empty to use the provider's default_model.
model: ""

# Sampling temperature:
#   0.0-0.3  deterministic / code / analysis
#   0.7      balanced default
#   1.0+     more exploratory / creative
temperature: 0.7

# Max completion tokens requested from the backend for a single answer.
# This is a hard runtime knob and can be changed live from chat.
max_tokens: 4096

# Stream tokens live in the terminal. False waits for the full answer first.
stream: true

# Search order when a provider exists in several auth sections.
# Example: gemini can exist under api_key and oauth.
provider_search_priority:
  - "no_auth"
  - "api_key"
  - "oauth"


# ==============================================================================
# No-Auth Providers
# ==============================================================================

# OpenAI-compatible providers that do not require credentials.
# Each provider entry should define:
#   base_url       API root including /v1 when relevant
#   default_model  model used when `model: ""`
#   context_window approximate maximum input context
no_auth:
  ollama:
    # Typical local endpoint exposed by `ollama serve`.
    base_url: "http://localhost:11434/v1"
    # Safe small default for local usage; override freely.
    default_model: "phi4-mini:latest"
    context_window: 32768


# ==============================================================================
# API-Key Providers
# ==============================================================================

# Cloud providers authenticated through environment variables.
# Resolution order for the key is handled elsewhere:
#   .env -> current environment -> login shell environment
api_key:
  mistral:
    # Name of the environment variable holding the provider key.
    api_key_env_var: "MISTRAL_API_KEY"
    base_url: "https://api.mistral.ai/v1"

    # Tool-calling capable Mistral chat models (official docs, March 28 2026).
    #
    # Recommended general-purpose tool users:
    #   - mistral-large-latest
    #       Flagship general model. Best default when you want broad capability,
    #       strong tool choice, and solid final answer quality without specializing.
    #   - mistral-medium-2508
    #       Strong frontier multimodal model. Good balance of quality/latency,
    #       but use the dated ID explicitly because the old alias
    #       "mistral-medium-latest" refers to an older legacy model.
    #   - mistral-small-latest   (currently Mistral Small 3.2 / mistral-small-2506)
    #       Faster and cheaper general model with tool use support.
    #
    # Reasoning / agentic models:
    #   - magistral-medium-latest   (currently Magistral Medium 1.2 / magistral-medium-2509)
    #       Best Mistral choice here for agentic reasoning, planning, and harder
    #       multi-step tool flows.
    #   - magistral-small-2509
    #       Lighter reasoning model when you want Magistral-style behavior at lower cost.
    #
    # SWE-specialized models:
    #   - devstral-latest
    #       Best specialized model for software engineering agents, codebase exploration,
    #       multi-file edits, and developer tooling.
    #   - devstral-medium-2507
    #       Enterprise-grade SWE model.
    #   - devstral-small-2507
    #       Smaller open SWE-oriented model.
    #
    # Coding model:
    #   - codestral-2508
    #       Strong coding model; useful when the task is code-heavy, but less of a
    #       universal agentic default than Magistral or Mistral Large.
    #
    # Edge / compact tool-capable models:
    #   - ministral-14b-2512
    #   - ministral-8b-2512
    #   - ministral-3b-2512
    #       Compact edge-deployable models with function calling support.
    #
    # Vision-capable tool users:
    #   - mistral-large-2512
    #   - mistral-medium-2508
    #   - mistral-small-2506
    #   - ministral-14b-2512 / ministral-8b-2512 / ministral-3b-2512
    #       Use these when the same agent must inspect images and call tools.
    #
    # Legacy alias to avoid:
    #   - mistral-medium-latest
    #       Old alias called out in the Mistral changelog; do not use as the default.
    default_model: "magistral-small-latest"
    context_window: 128000

  openai:
    api_key_env_var: "OPENAI_API_KEY"
    default_model: "gpt-4o"
    context_window: 128000

  groq:
    api_key_env_var: "GROQ_API_KEY"
    base_url: "https://api.groq.com/openai/v1"
    default_model: "qwen/qwen3-32b"
    context_window: 131072

  gemini:
    api_key_env_var: "GOOGLE_API_KEY"
    default_model: "gemini-2.5-flash"
    context_window: 1000000

  anthropic:
    api_key_env_var: "ANTHROPIC_API_KEY"
    default_model: "claude-sonnet-4-6"
    context_window: 200000

  dashscope:
    api_key_env_var: "DASHSCOPE_API_KEY"
    default_model: "qwen-turbo"
    context_window: 131072

  xai:
    api_key_env_var: "GROK_API_KEY"
    default_model: "grok-3-fast-beta"
    context_window: 131072


# ==============================================================================
# OAuth Providers
# ==============================================================================

# Browser-login providers. Useful when API-key auth is not desired.
oauth:
  gemini:
    oauth_provider_name: "google"
    oauth_scopes:
      - "https://www.googleapis.com/auth/cloud-platform"
    token_path: "~/.k-ai/tokens/google_oauth.json"
    default_model: "gemini-2.5-flash"
    context_window: 1000000
