# ┌─────────────────────────────────────────────────────────────────────────┐
# │  k-ai  —  Default Configuration                                         │
# │                                                                          │
# │  Built-in defaults are split into topical fragments for faster,          │
# │  cleaner maintenance. Export with:  k-ai config get -o my_config.yaml    │
# └─────────────────────────────────────────────────────────────────────────┘

# ==============================================================================
# Active LLM Settings
# ==============================================================================

# Default provider used when the user does not force one with --provider or
# via /provider in chat. Must match a key under no_auth, api_key, or oauth.
provider: "mistral"

# Optional model override. Leave empty to use the provider's default_model.
model: ""

# Sampling temperature:
#   0.0-0.3  deterministic / code / analysis
#   0.7      balanced default
#   1.0+     more exploratory / creative
temperature: 0.7

# Max completion tokens requested from the backend for a single answer.
# This is a hard runtime knob and can be changed live from chat.
max_tokens: 32768

# Stream tokens live in the terminal. False waits for the full answer first.
stream: true

# Search order when a provider exists in several auth sections.
# Example: gemini can exist under api_key and oauth.
provider_search_priority:
  - "no_auth"
  - "api_key"
  - "oauth"

# Optional per-provider auth-mode overrides.
# Example:
#   provider_auth_mode_overrides:
#     gemini: "oauth"
provider_auth_mode_overrides: {}


# ==============================================================================
# No-Auth Providers
# ==============================================================================

# OpenAI-compatible providers that do not require credentials.
# Each provider entry should define:
#   base_url       API root including /v1 when relevant
#   default_model  model used when `model: ""`
#   context_window approximate maximum input context
#   description    one-line summary shown in /provider list
#   has_free_trial true if a permanent free tier exists (no CC required)
no_auth:
  ollama:
    description: "Local inference via Ollama — fully sovereign, no network, no quota."
    has_free_trial: true  # local = free indefinitely 
    # Typical local endpoint exposed by `ollama serve`.
    base_url: "http://localhost:11434/v1"
    # Safe small default for local usage; override freely.
    default_model: "phi4-mini:latest"
    context_window: 32768
    #
    # ── Last fetched: 2026-03-30 ─────────────────────────────────────────────
    # Local models detected at time of config generation (depends on your pull list):
    #
    # Reasoning / agentic:
    #   deepseek-r1:latest           DeepSeek R1 — chain-of-thought reasoning, math, code
    #
    # General chat:
    #   mistral-small:latest         Mistral Small — fast general chat (local mirror)
    #   phi4-mini:latest             Microsoft Phi-4 Mini — compact, great for light tasks
    #   phi3:medium                  Microsoft Phi-3 Medium — efficient, solid coding
    #   phi3.5:latest                Phi-3.5 — improved multilingual over Phi-3
    #   qwen3.5:9b                   Qwen 3.5 9B — Alibaba; strong multilingual + tool use
    #   qwen3.5:latest               Qwen 3.5 latest tag
    #
    # SWE/coding:
    #   devstral-small-2:latest      Devstral Small v2 — open SWE model by Mistral
    #
    # Embedding (not chat-compatible, used with /embed or pipelines):
    #   mxbai-embed-large:latest     MixedBread large embedding model
    #   nomic-embed-text:latest      Nomic Atlas text embedding


# ==============================================================================
# API-Key Providers
# ==============================================================================

# Cloud providers authenticated through environment variables.
# Resolution order for the key is handled elsewhere:
#   .env -> current environment -> login shell environment
api_key:
  mistral:
    description: >-
      Mistral AI — generous permanent free tier: all models (incl. Large &
      Codestral), 2 RPM, 500K TPM, 1B tok/month. Best free API for quality.
