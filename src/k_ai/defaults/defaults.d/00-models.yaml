# ==============================================================================
# OAuth Providers
# ==============================================================================

# Browser-login providers. Useful when API-key auth is not desired.
oauth:
  gemini:
    description: "Google Gemini via OAuth (Vertex AI scope) — for projects needing browser-based auth."
    has_free_trial: true
    oauth_provider_name: "google"
    oauth_scopes:
      - "https://www.googleapis.com/auth/cloud-platform"
    token_path: "~/.k-ai/tokens/google_oauth.json"
    client_id_env_var: "GOOGLE_CLIENT_ID"
    client_secret_env_var: "GOOGLE_CLIENT_SECRET"
    vertex_project_env_var: "VERTEXAI_PROJECT"
