# ==============================================================================
# CLI & UI Behaviour
# ==============================================================================

cli:
  # Show prompt/completion usage after each answer when available.
  show_token_usage: true

  # UI theme preset controlling panel accents and syntax highlighting.
  # Unknown values fall back safely to "default".
  theme: "default"

  # Rich spinner name while waiting for first model output.
  # Any Rich spinner name is accepted; invalid names fall back safely at runtime.
  thinking_indicator: "clock"

  # Show a human-readable justification panel before each tool execution.
  # If the model does not provide one, k-ai derives a fallback rationale from
  # the tool description and main input so the approval panel stays transparent.
  show_tool_rationale: true

  # Show the runtime banner at launch.
  show_welcome_panel: true

  # Rendering mode for assistant text.
  #   raw       plain text only
  #   markdown  Rich markdown
  #   rich      markdown + richer formatting helpers
  render_mode: "rich"

  # Maximum characters shown for a tool result in the UI panel.
  tool_result_max_display: 2000

  # Maximum characters from a tool result kept in history sent back to the LLM.
  # This protects against prompt bloat and provider TPM/rate spikes.
  tool_result_max_history: 4000

  # Show the runtime transparency panel after completed turns and config changes.
  show_runtime_stats: true

  # Runtime transparency density:
  #   compact  essential stats only
  #   full     adds policy/token source details
  runtime_stats_mode: "compact"

  # Legacy emergency switch: if true, every tool asks for approval.
  # Prefer using tool approval policies instead.
  confirm_all_tools: false

  # Print raw prompts and raw model outputs before rendering.
  debug: false


# ==============================================================================
# Prompts
# ==============================================================================

prompts:
  # Customizable assistant name used in prompt templates.
  # This is the visible/default identity of the assistant and can be changed
  # later through init_system or direct config editing.
  assistant_name: "k-ai"

  # Prompt templates support the following placeholders:
  #   {assistant_name}  current assistant display name from config
  #   {user_name}       preferred user name inferred from internal memory
  #   {provider}        active provider name
  #   {model}           active model name
  #   {active_tools}    comma-separated active internal tools
  #   {user_input}      current raw user message for turn-local guidance
  #   {target_summary}  summary of the new session already entered after switch
  #   {switch_reason}   stored reason for that already-approved switch

  # Base system prompt used for normal interactive turns.
  identity: >-
    You are {assistant_name}, an intelligent CLI chat assistant.
    You have access to internal tools for session management, memory,
    runtime inspection, config inspection, config updates, config persistence,
    tool approval inspection, tool approval updates, search, code execution,
    Python sandbox package management, and more. When you detect the user wants
    to perform a meta-action (start new session, resume old one, inspect or change
    settings or limits, manage memory, inspect runtime transparency, exit, etc.),
    propose the appropriate tool instead of guessing.
    Prefer tool-backed verification over your own memory whenever a tool can
    confirm the answer. Use python_exec for deterministic reasoning,
    arithmetic, algebra, matrix work, symbolic checks, and any calculation
    that should not rely on mental math. Use shell_exec for local system,
    filesystem, environment, and command-output questions that can be checked
    directly. Use exa_search for factual claims that may need confirmation,
    especially when recency or external verification matters. Do not rely only
    on memory when one of these tools can verify the claim. If no suitable
    tool is available, answer carefully and state the uncertainty instead of
    pretending certainty.
    When the user refers to session ordering using words like first/last,
    premier/dernier, top/bottom, interpret that relative to the visible
    session table order. The table is shown newest first from top to bottom,
    so the bottom rows are the oldest displayed sessions. Example: in French,
    "les 3 derniers chats" means the 3 bottom rows of the visible table, not
    the 3 most recent chats at the top.
    If a sessions list already contains summary, themes, and message counts,
    use that metadata directly. Do not call session_digest just to restate
    metadata that is already visible.
    Keep each session semantically homogeneous. If the current session is
    clearly drifting into a different dominant intent, propose switch_session
    instead of mixing unrelated work into the same thread.
    When the user wants to initialize, rename, or personalize the assistant
    identity, use init_system instead of only acknowledging the request.
    The user will validate or reject your proposals. For normal questions,
    answer directly only after checking whether a deterministic or verification
    tool should be used first.

  # Turn-local guidance injected when there is an active session and a fresh
  # user message to evaluate for semantic drift.
  turn_session_guidance: >-
    Inspect the latest user message carefully:
    "{user_input}"
    Decide whether it explicitly asks for a fresh session or clearly pivots to
    a different dominant topic than the active session profile. If so, propose
    the appropriate session tool before answering the new topic directly:
    use new_session when the user explicitly asks for a new chat/session, and
    use switch_session when the request mainly signals topic drift and would be
    cleaner in a separate session. If the user rejects the proposal, answer the
    substantive request naturally in the current session instead of insisting.

  # Guidance injected only when a session switch has already been approved and
  # the carried message is being replayed in the fresh session.
  continuation_after_switch: >-
    A session switch has already been approved and completed for the current
    carried-over user request. You are already inside the target session, so do
    not propose another session-switch tool just because the carried message may
    mention switching topics or creating a new session. Continue the substantive
    request directly here.
    - target summary: {target_summary}
    - switch reason: {switch_reason}

  notices:
    prompt_interrupt_title: "Interrupt"
    prompt_interrupt_message: >-
      Prompt input was interrupted. Press Ctrl+C a second time to exit, or keep typing.
    session_switched_title: "Session Switched"
    session_switched_message: >-
      A fresh session is now active. Continue the carried request in this cleaner thread.
    finalization_interrupted_title: "Interrupt"
    finalization_interrupted_message: >-
      Exit finalization was interrupted. The current session was kept as-is.
    boot_interrupted_title: "Interrupt"
    boot_interrupted_message: >-
      Boot generation was interrupted. Control has been returned to the prompt.
    init_interrupted_title: "Interrupt"
    init_interrupted_message: >-
      Initialization was interrupted. Control has been returned to the prompt.
    switch_already_done_title: "Switch Already Completed"
    switch_already_done_message: >-
      The session change has already been completed for this carried request. Any further session-split proposal for the same carried turn is ignored.
    empty_response_title: "Empty Response"
    empty_response_message: >-
      The model returned neither text nor tool calls. Retrying automatically.
    canceled_turn_title: "Turn Canceled"
    canceled_turn_message: >-
      The model produced no usable response or action, so nothing was recorded for this turn.
    session_split_title: "Session Split"
    session_split_message: >-
      The session change was approved. The carried request will continue inside a fresh session.
    action_interrupted_title: "Interrupt"
    action_interrupted_message: >-
      The requested action was interrupted. Control has been returned to the prompt.
    generation_interrupted_title: "Interrupt"
    generation_interrupted_message: >-
      Generation was interrupted by the user. Partial output, if any, was kept and control has been returned.
    session_not_found_title: "Session Error"
    session_not_found_message: >-
      Session {session_id} was not found.
    session_resumed_title: "Session Resumed"
    session_resumed_message: >-
      Session [bold]{session_title}[/bold] ([dim]{session_type}[/dim]) was resumed with {message_count} loaded messages.
    goodbye_message: >-
      Goodbye!

  # Boot prompt used when recent sessions are already shown in the UI.
  boot_with_sessions: >-
    [SESSION_BOOT] The user just opened k-ai and the recent sessions table
    is already visible on screen. Do not ask to display the list again and
    do not call list_sessions. Greet them briefly, reference one or two
    relevant sessions already shown, and suggest either resuming one of them
    or starting fresh. Keep it short (2-3 sentences). If you explicitly
    propose resuming a specific session, you may use the load_session tool.

  # Boot prompt used when no recent sessions exist.
  boot_no_sessions: >-
    [SESSION_BOOT] The user just opened k-ai for the first time
    (or has no recent sessions). Greet them warmly and briefly.
    If you know anything about them from memory, personalise the greeting.
    Keep it to 1-2 sentences.

  # Onboarding prompt used when there is no local history and no internal memory,
  # or when the user explicitly asks for /init.
  init_intro: >-
    [INIT] You are onboarding a fresh or newly reinitialized user as {assistant_name}.
    Ask exactly two short questions, and nothing else for now:
    1. What should I call myself?
    2. What should I call you?
    Explain briefly that your own name will be stored in config and the user's
    preferred name in persistent memory. Do not call tools yet. Wait for the user's answer.

  # Extra guidance injected while onboarding remains active.
  init_active: >-
    Initialization mode is active. If one of the two names is still missing,
    ask only for the missing item(s). When both names are known, call
    init_system with assistant_name and user_name. After the tool succeeds,
    give a concise but vivid introduction of the system: what the user can do
    directly with slash commands or CLI, and what you can do for them through
    your tools and active capabilities.

  # Instruction used when compacting old context.
  compact_summarize: >-
    Summarize the following conversation concisely, preserving key
    facts, decisions, and context needed to continue the conversation.

  # Short one-line digest used early in a session.
  session_summary: >-
    Summarize the user's intent and the discussion topic in one short sentence.

  # Full digest prompt used for summary + themes + session_type.
  session_digest: >-
    Return strict JSON with keys "summary", "themes", and "session_type".
    "summary" must be one short sentence describing the discussion.
    "themes" must be a short list of 3 to 8 key topics.
    "session_type" must be either "classic" or "meta".
    Use "classic" for a real task, question, topic, or project discussion.
    Use "meta" when the session is mainly about settings, admin, tools,
    prompts, validation policies, runtime inspection, or chat management.

  # Optional title generation prompt retained for explicit exit/title flows.
  exit_title: >-
    Generate a short title (max 60 chars) for this chat.

  # Longer end-of-session textual summary.
  exit_summary: >-
    Summarize this chat in 2-3 sentences.
