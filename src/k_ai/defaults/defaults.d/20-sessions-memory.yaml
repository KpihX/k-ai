# ==============================================================================
# Sessions
# ==============================================================================

sessions:
  # Directory containing the session index and per-session JSONL logs.
  directory: "~/.k-ai/sessions"

  # Number of recent sessions shown on boot and in default listings.
  max_recent: 10

  # When resuming a session:
  #   0  => load full history
  #   N  => load only the last N messages into active context
  load_last_n: 10

  # Number of recent messages echoed in the terminal after /load.
  preview_last_n: 10

  # Default extraction window for explicit session slicing.
  extract_limit: 12


# ==============================================================================
# Context Compaction
# ==============================================================================

compaction:
  # Auto-compaction trigger expressed as % of provider context window.
  # Set 0 to disable automatic compaction entirely.
  trigger_percent: 80

  # Number of recent messages preserved verbatim during compaction.
  keep_last_n: 10

  # Refresh digest metadata after compaction.
  auto_rename: true


# ==============================================================================
# Memory
# ==============================================================================

memory:
  # Agent instruction/context file injected into the system prompt.
  agents_path: "~/.k-ai/AGENTS.md"

  # Mutable k-ai memory markdown file injected into the system prompt.
  path: "~/.k-ai/MEMORY.md"


# ==============================================================================
# Runtime State Git Tracking
# ==============================================================================

runtime_git:
  # When enabled, k-ai treats the runtime store (~/.k-ai by default) as a local
  # git repo that snapshots the durable conversational state:
  #   - config.yaml
  #   - MEMORY.md
  #   - sessions/index.json
  #   - sessions/*.jsonl
  #
  # The runtime git helper intentionally ignores the Python sandbox and other
  # bulky or ephemeral artifacts.
  enabled: true

  # On interactive chat exit, automatically `git add .` and create a commit
  # when tracked runtime state changed.
  auto_commit_on_chat_exit: true

  # Prefix used for automatic runtime-store commit subjects.
  commit_prefix: "chat:"

  # Maximum length of the git commit subject generated from the session digest.
  commit_subject_max_length: 72
