# ==============================================================================
# Config Persistence
# ==============================================================================

config:
  # Default path used by /config save and chat-side config persistence.
  persist_path: "~/.k-ai/config.yaml"
  # Preferred editor used by `k-ai config edit`.
  # If empty, runtime falls back to:
  #   1. $K_AI_EDITOR
  #   2. $VISUAL
  #   3. $EDITOR
  #   4. nano
  editor: ""


# ==============================================================================
# Tool Approval Policies
# ==============================================================================

tool_approval:
  # Resolution order at runtime:
  #   1. catalog[*].protected      -> always ask
  #   2. session overrides         -> ephemeral for current chat session only
  #   3. global_overrides          -> persisted across future sessions
  #   4. catalog[*].default_policy -> fallback baseline
  #
  # The catalog below is the single source of truth for:
  #   - category
  #   - risk
  #   - default_policy
  #   - protected
  # Runtime logic derives everything from this catalog.
  # Durable overrides persisted across future sessions.
  # Shape:
  #   tools.<tool_name>: ask|auto
  #   categories.<category>: ask|auto
  #   risks.<risk>: ask|auto
  # Any malformed entry now fails fast at runtime.
  global_overrides:
    tools: {}
    categories: {}
    risks: {}

  # Catalog of every internal tool/action shipped by k-ai.
  # This is both documentation and the runtime source of truth for
  # category/risk/default_policy/protected.
  catalog:
    session:
      new_session:
        category: session
        risk: medium
        default_policy: ask
        protected: false
        description: Start a fresh session, optionally seeded with type/summary/themes.
      init_system:
        category: session
        risk: medium
        default_policy: ask
        protected: false
        description: Start or complete the assistant/user naming and onboarding flow.
      switch_session:
        category: session
        risk: medium
        default_policy: ask
        protected: false
        description: Split intent and continue the current request in a new homogeneous session.
      load_session:
        category: session
        risk: medium
        default_policy: ask
        protected: false
        description: Resume an older session, optionally with only the last N messages.
      exit_session:
        category: session
        risk: high
        default_policy: ask
        protected: false
        description: Exit k-ai after finalizing the current session.
      rename_session:
        category: session
        risk: medium
        default_policy: ask
        protected: false
        description: Rename the current session title.
      list_sessions:
        category: session
        risk: low
        default_policy: auto
        protected: false
        description: List persisted sessions with id, type, summary, themes, counts, and dates.
      session_extract:
        category: session
        risk: low
        default_policy: auto
        protected: false
        description: Inspect a slice/window of messages from a session.
      session_digest:
        category: session
        risk: medium
        default_policy: ask
        protected: false
        description: Generate or refresh summary, themes, and session_type metadata.
      delete_session:
        category: session
        risk: high
        default_policy: ask
        protected: false
        description: Permanently delete a persisted session.
      compact_session:
        category: session
        risk: high
        default_policy: ask
        protected: false
        description: Compact old context into a summary while keeping recent messages in full.

    ui:
      clear_screen:
        category: ui
        risk: low
        default_policy: auto
        protected: false
        description: Clear the terminal screen only.

    runtime:
      runtime_status:
        category: runtime
        risk: low
        default_policy: auto
        protected: false
        description: Show live runtime transparency stats and limits.

    config:
      get_config:
        category: config
        risk: low
        default_policy: auto
        protected: false
        description: Inspect one config key or the full merged active config.
      list_config:
        category: config
        risk: low
        default_policy: auto
        protected: false
        description: List config keys with optional prefix filtering.
      set_config:
        category: config
        risk: high
        default_policy: ask
        protected: false
        description: Change a runtime config value except tool_approval.* governance keys.
      save_config:
        category: config
        risk: high
        default_policy: ask
        protected: false
        description: Persist the current active merged config to disk.

    tool_admin:
      tool_policy_list:
        category: tool-admin
        risk: critical
        default_policy: ask
        protected: true
        description: Show effective approval policies for all internal tools.
      tool_policy_set:
        category: tool-admin
        risk: critical
        default_policy: ask
        protected: true
        description: Set a tool/category/risk approval policy at session or global scope.
      tool_policy_reset:
        category: tool-admin
        risk: critical
        default_policy: ask
        protected: true
        description: Remove a session/global approval override and fall back to the next source.
      tool_capability_list:
        category: tool-admin
        risk: low
        default_policy: auto
        protected: false
        description: List the high-level tool capability groups that can be enabled or disabled live.
      tool_capability_set:
        category: tool-admin
        risk: high
        default_policy: ask
        protected: false
        description: Enable or disable one mutable tool capability group such as exa, python, shell, qmd, or mcp.

    memory:
      memory_add:
        category: memory
        risk: medium
        default_policy: ask
        protected: false
        description: Add a fact or preference to persistent internal memory.
      memory_list:
        category: memory
        risk: low
        default_policy: auto
        protected: false
        description: List internal memory entries.
      memory_remove:
        category: memory
        risk: high
        default_policy: ask
        protected: false
        description: Remove a memory entry by id.

    skills:
      activate_skill:
        category: skills
        risk: low
        default_policy: auto
        protected: false
        description: Load one available skill into the current turn context before answering.

    mcp:
      mcp_server_list:
        category: mcp-admin
        risk: low
        default_policy: auto
        protected: false
        description: List configured MCP servers and current discovered MCP runtime state.
      mcp_server_probe:
        category: mcp-admin
        risk: low
        default_policy: auto
        protected: false
        description: Probe likely local commands and package metadata for an MCP server.
      mcp_server_upsert:
        category: mcp-admin
        risk: high
        default_policy: ask
        protected: false
        description: Create or update one MCP server definition in runtime config.
      mcp_server_remove:
        category: mcp-admin
        risk: high
        default_policy: ask
        protected: false
        description: Remove one MCP server definition from runtime config.
      mcp_server_set_enabled:
        category: mcp-admin
        risk: medium
        default_policy: ask
        protected: false
        description: Enable or disable one configured MCP server.
      mcp_server_install:
        category: mcp-admin
        risk: high
        default_policy: ask
        protected: false
        description: Install one stdio MCP server package and register it in runtime config.
      mcp_resource_list:
        category: mcp-admin
        risk: low
        default_policy: auto
        protected: false
        description: List MCP resources exposed by configured servers.
      mcp_resource_read:
        category: mcp-admin
        risk: low
        default_policy: auto
        protected: false
        description: Read one MCP resource by server and URI.
      mcp_resource_template_list:
        category: mcp-admin
        risk: low
        default_policy: auto
        protected: false
        description: List MCP resource templates exposed by configured servers.
      mcp_prompt_list:
        category: mcp-admin
        risk: low
        default_policy: auto
        protected: false
        description: List MCP prompts exposed by configured servers.
      mcp_prompt_get:
        category: mcp-admin
        risk: low
        default_policy: auto
        protected: false
        description: Load one MCP prompt by server and prompt name.
      mcp_catalog_reload:
        category: mcp-admin
        risk: low
        default_policy: auto
        protected: false
        description: Refresh MCP discovery and rebuild imported MCP tools.

    web:
      exa_search:
        category: web
        risk: low
        default_policy: auto
        protected: false
        description: Search the public web through the Exa API.

    execution:
      python_exec:
        category: execution
        risk: high
        default_policy: ask
        protected: false
        description: Execute Python code in the sandboxed runtime.
      python_sandbox_list_packages:
        category: execution
        risk: low
        default_policy: auto
        protected: false
        description: List installed packages in the Python sandbox.
      python_sandbox_install_packages:
        category: execution
        risk: high
        default_policy: ask
        protected: false
        description: Install one or more packages in the Python sandbox.
      python_sandbox_remove_packages:
        category: execution
        risk: high
        default_policy: ask
        protected: false
        description: Remove one or more non-core packages from the Python sandbox.
      shell_exec:
        category: execution
        risk: high
        default_policy: ask
        protected: false
        description: Execute a shell command in the sandboxed runtime.

    knowledge:
      qmd_query:
        category: knowledge
        risk: low
        default_policy: auto
        protected: false
        description: Hybrid QMD search over indexed knowledge/session content.
      qmd_search:
        category: knowledge
        risk: low
        default_policy: auto
        protected: false
        description: Keyword BM25 QMD search.
      qmd_vsearch:
        category: knowledge
        risk: low
        default_policy: auto
        protected: false
        description: Vector similarity QMD search.
      qmd_get:
        category: knowledge
        risk: low
        default_policy: auto
        protected: false
        description: Open a single indexed QMD document.
      qmd_multi_get:
        category: knowledge
        risk: low
        default_policy: auto
        protected: false
        description: Open multiple indexed QMD documents.
      qmd_ls:
        category: knowledge
        risk: low
        default_policy: auto
        protected: false
        description: List indexed files in a QMD collection.
      qmd_collection_list:
        category: knowledge
        risk: low
        default_policy: auto
        protected: false
        description: List all QMD collections.
      qmd_collection_add:
        category: knowledge
        risk: high
        default_policy: ask
        protected: false
        description: Add a new QMD collection.
      qmd_collection_remove:
        category: knowledge
        risk: high
        default_policy: ask
        protected: false
        description: Remove a QMD collection.
      qmd_collection_show:
        category: knowledge
        risk: low
        default_policy: auto
        protected: false
        description: Show details for a QMD collection.
      qmd_status:
        category: knowledge
        risk: low
        default_policy: auto
        protected: false
        description: Inspect QMD index health and stats.
      qmd_update:
        category: knowledge
        risk: high
        default_policy: ask
        protected: false
        description: Refresh or rebuild indexed QMD content.
      qmd_embed:
        category: knowledge
        risk: high
        default_policy: ask
        protected: false
        description: Refresh QMD vector embeddings.
      qmd_cleanup:
        category: knowledge
        risk: high
        default_policy: ask
        protected: false
        description: Cleanup/vacuum QMD caches and storage.
      qmd_context_list:
        category: knowledge
        risk: low
        default_policy: auto
        protected: false
        description: List attached QMD context snippets.
      qmd_context_add:
        category: knowledge
        risk: high
        default_policy: ask
        protected: false
        description: Attach a context summary to a QMD collection.
      qmd_context_rm:
        category: knowledge
        risk: high
        default_policy: ask
        protected: false
        description: Remove a context summary from a QMD collection.


# ==============================================================================
# External Tools
# ==============================================================================

tools:
  # Runtime capability switches are separate from tool_approval:
  #   - tools.<capability>.enabled controls whether the LLM/UI can use a family
  #   - tool_approval controls ask/auto policy only for tools that are enabled
  # This avoids contradictory "enabled in one place, approval elsewhere" logic.

  # High-level capability switch for Exa-backed public web search.
  # Controls the exa_search tool family.
  exa:
    enabled: true
    api_key_env_var: "EXA_API_KEY"
    num_results: 5

  # High-level capability switch for the sandboxed Python runtime.
  # Controls python_exec + python_sandbox_* tools.
  python:
    enabled: true
    timeout: 30
    install_timeout: 300
    # Dedicated sandbox/venv used for numpy, scipy, pandas, etc.
    sandbox_dir: "~/.k-ai/sandbox"
    # Default packages installed when the sandbox is first created.
    default_packages:
      - "numpy"
      - "sympy"
      - "scipy"
      - "pandas"
      - "matplotlib"
      - "seaborn"
      - "scikit-learn"

  # High-level capability switch for sandboxed shell execution.
  # Controls the shell_exec tool.
  shell:
    enabled: true
    timeout: 30
    interactive_patterns:
      - "(?i)\\bsudo\\b"
      - "(?i)\\bpasswd\\b"
      - "(?i)\\bsu\\b"
    interactive_command_message: >-
      This command appears interactive or TTY-bound and should not run through
      shell_exec. Use a local shell block instead, for example `!{command}`,
      then use `/focus shell` if the command prompts for a password or further
      input.

  # High-level capability switch for all QMD-backed knowledge tools.
  # Controls qmd_query, qmd_search, qmd_vsearch, qmd_get, collections, context,
  # status/update/embed/cleanup, and related helpers.
  qmd:
    enabled: true
    limit: 5
    query_timeout: 180
    keyword_timeout: 30
    vector_timeout: 30
    # Restrict session/history retrieval to the dedicated k-ai collection.
    session_collection: "k-ai"

  # High-level capability switch for dynamic tools imported from configured MCP servers.
  # Controls all runtime tools whose names are prefixed with mcp__.
  mcp:
    enabled: true
