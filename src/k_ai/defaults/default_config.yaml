# Default Configuration for k-ai
# This file serves as the fallback configuration.
# Users can override these settings with an external config file.

# ==============================================================================
# 1. Active LLM Settings
# ==============================================================================
provider: "ollama"
temperature: 0.7
max_tokens: 8192
stream: true

# The order in which to search for a provider if no auth_mode is specified
provider_search_priority:
  - "no_auth_providers"
  - "api_providers"
  - "oauth_providers"

# ==============================================================================
# 2. CLI & UI Behavior
# ==============================================================================
cli:
  show_token_usage: true
  theme: "default"
  thinking_indicator: "dots"
  show_welcome_panel: true

# ==============================================================================
# 3. Provider Registry
# ==============================================================================

no_auth_providers:
  ollama:
    base_url: "http://localhost:11434/v1"
    default_model: "phi4-mini:latest"
    context_window: 32768

api_providers:
  mistral:
    api_key_env_var: "MISTRAL_API_KEY"
    default_model: "mistral-large-latest"
    context_window: 128000

  openai:
    api_key_env_var: "OPENAI_API_KEY"
    default_model: "gpt-4o"
    context_window: 128000

  groq:
    api_key_env_var: "GROQ_API_KEY"
    default_model: "qwen/qwen3-32b"
    context_window: 32768
    
  gemini:
    api_key_env_var: "GOOGLE_API_KEY"
    default_model: "gemini-2.5-flash"
    context_window: 1000000

  anthropic:
    api_key_env_var: "ANTHROPIC_API_KEY"
    default_model: "claude-3-sonnet-20240229"
    context_window: 200000

  dashscope:
    api_key_env_var: "DASHSCOPE_API_KEY"
    default_model: "qwen-turbo"
    context_window: 6144

# ==============================================================================
# 4. OAuth Based Providers
# ==============================================================================
# For providers that support browser-based OAuth authentication.

oauth_providers:
  gemini: # The provider key 'gemini' is the same, but it's in a different section
    oauth_provider_name: "google"
    oauth_scopes:
      - "https://www.googleapis.com/auth/cloud-platform"
    token_path: "~/.k_ai/tokens/google_oauth.json"
    default_model: "gemini-2.5-flash"
    context_window: 1000000
