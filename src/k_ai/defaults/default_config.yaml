# Default Configuration for k-ai
# This file serves as the fallback configuration.
# Users can override these settings with an external config file.

# ==============================================================================
# 1. Active LLM Settings
# ==============================================================================
provider: "mistral"
temperature: 0.7
max_tokens: 4096
stream: true

# ==============================================================================
# 2. CLI & UI Behavior
# ==============================================================================
cli:
  show_token_usage: true
  theme: "default"
  thinking_indicator: "dots" # (dots, bar, etc.)
  show_welcome_panel: true

# ==============================================================================
# 3. Provider Registry
# ==============================================================================
# Defines available providers and their specific configurations.
# Based on the LiteLLM driver, adding a provider is as simple as adding an entry.

openai_providers:
  mistral:
    api_key_env_var: "MISTRAL_API_KEY"
    default_model: "mistral-large-latest"
    context_window: 32000

  openai:
    api_key_env_var: "OPENAI_API_KEY"
    default_model: "gpt-4o"
    context_window: 128000

  groq:
    api_key_env_var: "GROQ_API_KEY"
    default_model: "llama3-70b-8192"
    context_window: 8192
    
  google-api: # Renamed from 'google' to be explicit
    auth_mode: "api_key"
    api_key_env_var: "GOOGLE_API_KEY"
    default_model: "gemini-1.5-pro-latest"
    context_window: 1000000

  ollama:
    base_url: "http://localhost:11434/v1"
    api_key_value: "ollama" # Dummy key
    default_model: "phi3:medium"
    context_window: 8192

# ==============================================================================
# 4. OAuth Based Providers
# ==============================================================================
# For providers that support browser-based OAuth authentication.

google_oauth_providers:
  google-pro:
    auth_mode: "oauth"
    oauth_provider_name: "google"
    oauth_scopes:
      - "https://www.googleapis.com/auth/cloud-platform"
    token_path: "~/.k_ai/tokens/google_oauth.json"
    default_model: "gemini-1.5-pro-latest"
    context_window: 1000000
