# ==============================================================================
# k-ai installation profile
# ==============================================================================
#
# This file controls the interactive behavior of ./scripts/install.sh.
# It is intentionally verbose and heavily commented so the user does not have
# to guess what the installer can do.
#
# Typical workflow:
#   1. clone the repo
#   2. optionally edit this file
#   3. run:
#        ./scripts/install.sh
#      or:
#        ./scripts/install.sh -p defaults
#      or:
#        ./scripts/install.sh --path /path/to/my-install.yaml
#
# Notes:
# - The installer remains interactive by default.
# - This file provides the default answers and available options.
# - The runtime config lives elsewhere (~/.k-ai/config.yaml); this file is only
#   for installation-time defaults and interaction.

# Bootstrap strategy before k-ai itself is installed.
bootstrap:
  # Preferred mode for this project. When uv is available, the installer uses it
  # for syncing dependencies and creating the user-facing command shim.
  # If set to false, the installer skips uv on purpose and uses the isolated
  # bootstrap virtualenv path below instead.
  prefer_uv: true

  # If uv is missing, ask whether it should be installed automatically.
  # Cases shown to the user:
  #   yes -> install uv now, then continue with the preferred uv workflow
  #   no  -> skip uv and continue with the isolated pip fallback below
  offer_uv_install: true

  # Default answer for the "Install uv now?" question.
  # true  -> pressing Enter accepts uv installation
  # false -> pressing Enter keeps the fallback path
  install_uv_by_default: true

  # If uv remains unavailable, allow the installer to fall back to an isolated
  # virtualenv dedicated to k-ai. This avoids polluting the system Python.
  allow_pip_fallback: true

  # Isolated fallback environment used when uv is unavailable or declined.
  # It contains the editable k-ai install plus test/runtime dependencies needed
  # by the installer. This is NOT the dedicated Python capability sandbox.
  bootstrap_venv: "~/.k-ai/bootstrap-cli"

  # Where the fallback launcher script should be written when uv is not used.
  # The installer creates `k-ai` here and points it to the isolated bootstrap
  # environment above.
  bin_dir: "~/.local/bin"

  # Official uv installer used by the automatic uv installation path.
  uv_installer_url: "https://astral.sh/uv/install.sh"

# Global installer behavior.
interactive:
  # If true, the installer will ask questions whenever the corresponding
  # section enables prompting. If false, the installer uses the defaults below.
  enabled: true

  # If true, the installer asks for confirmation package-by-package for the
  # default sandbox package list below.
  ask_default_python_packages_one_by_one: true

  # If true, after the default package loop, the installer keeps asking for
  # extra sandbox packages until the user provides an empty line.
  allow_extra_python_packages: true

  # In interactive mode, the installer explains the available choices before
  # prompts that have multiple meaningful cases (uv install, editor strategy,
  # package selection, extra package loop).
  # This is currently a documentation promise for the UX, not a separate toggle
  # consumed by the runtime.


# Where runtime state will live after installation.
runtime_store:
  # Root runtime directory used by k-ai for config, memory, sessions, sandbox.
  home_dir: "~/.k-ai"


# Local git repo for the runtime store (~/.k-ai by default).
runtime_git:
  # If true, the installer writes a managed .gitignore, initializes a local git
  # repo in the runtime store, and writes runtime_git.* into config.yaml.
  enabled: true

  # If true, k-ai automatically commits runtime changes on interactive chat exit
  # using the session digest as the commit message subject.
  auto_commit_on_chat_exit: true

  # Prefix used for automatic runtime-store commit messages.
  commit_prefix: "chat:"

  # First commit created by the installer after initializing the runtime repo.
  initial_commit_message: "init: k-ai runtime store"


# Initial high-level tool capabilities written into ~/.k-ai/config.yaml.
# These are the live-switchable families that the user can later manage via the
# chat/runtime layer:
#   /tools capabilities
#   /tools enable <exa|python|shell|qmd>
#   /tools disable <exa|python|shell|qmd>
capabilities:
  # Public web search through the Exa API.
  exa: true

  # Sandboxed Python execution plus sandbox package management.
  python: true

  # Sandboxed shell command execution.
  shell: true

  # QMD-backed knowledge and history retrieval tools.
  qmd: true


# Editor behavior for `k-ai config edit` and `/config edit`.
editor:
  # Explicit preferred editor. Leave empty to discover interactively/fallback.
  preferred: ""

  # If true and `micro` is not already available, the installer proposes to
  # install it and use it as the default editor for k-ai.
  offer_micro_install: true

  # Fallback editor used when no preferred/system editor is found.
  fallback: "nano"


# Python sandbox initialization.
python_sandbox:
  # If true, create the sandbox virtualenv during install.
  enabled: true

  # Path of the dedicated Python capability sandbox virtualenv.
  sandbox_dir: "~/.k-ai/sandbox"

  # Default package set proposed at installation time.
  # These are also persisted into tools.python.default_packages so that a
  # future sandbox rebuild keeps the same baseline.
  default_packages:
    - "numpy"
    - "sympy"
    - "scipy"
    - "pandas"
    - "matplotlib"
    - "seaborn"
    - "scikit-learn"


# Optional QMD integration.
qmd:
  # If true, attempt to install qmd when it is missing.
  install_if_missing: true

  # Which collection name to create for k-ai sessions.
  collection_name: "k-ai"

  # File glob used when indexing session files.
  collection_mask: "**/*.{jsonl,json}"

  # Human-readable context attached to the collection.
  context_summary: >-
    k-ai session history — JSONL message logs (user/assistant/tool exchanges)
    and session metadata. Search past conversations, decisions, code, context.


# Final verification behavior.
verification:
  # Prefer `make check` when available.
  prefer_make_check: true

  # Run `k-ai doctor` at the end of installation.
  run_doctor: true
